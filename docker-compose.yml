version: '3.8'

services:
  # Demonstration game
  the-lost-grid:
    build:
      context: .
      dockerfile: examples/TheLostGrid.Server/Dockerfile
    container_name: pixel_terminal_app
    ports:
      - "5221:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__Redis=pixel-terminal-cache:6379,password=secret_password_123,abortConnect=false
      - Serilog__MinimumLevel__Default=Information
      - Serilog__MinimumLevel__Override__Microsoft=Warning
      - Serilog__WriteTo__0__Name=Console
      - Serilog__WriteTo__1__Name=File
      - Serilog__WriteTo__1__Args__path=/app/logs/server-.log
      - Serilog__WriteTo__1__Args__rollingInterval=Day
      - Serilog__WriteTo__1__Args__outputTemplate={Timestamp:yyyy-MM-dd HH:mm:ss.fff zzz} [{Level:u3}] [{SourceContext}] {Message:lj}{NewLine}{Exception}
    depends_on:
      pixel-terminal-cache:
        condition: service_healthy
    restart: unless-stopped

  # High-performance distributed key-value session storage engine
  pixel-terminal-cache:
    image: redis:alpine
    container_name: pixel_terminal_cache
    command: redis-server --requirepass secret_password_123 --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "secret_password_123", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # Web-GUI management tool via official GitHub Container Registry
  redis-commander:
    container_name: redis-commander
    hostname: redis-commander
    image: ghcr.io/joeferner/redis-commander:latest
    restart: always
    environment:
      - REDIS_HOSTS=local:pixel-terminal-cache:6379:0:secret_password_123
    ports:
      - "8082:8081"
    depends_on:
      pixel-terminal-cache:
        condition: service_healthy

volumes:
  redis_data:
