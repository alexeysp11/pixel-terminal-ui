services:
  mongodb:
    image: mongo:7.0
    container_name: pixel_terminal_mongo
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: secret_password_123
    volumes:
      - mongo_data:/data/db

  mongo-express:
    image: mongo-express:latest
    container_name: pixel_terminal_mongo_express
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: admin
      ME_CONFIG_MONGODB_ADMINPASSWORD: secret_password_123
      ME_CONFIG_MONGODB_URL: mongodb://admin:secret_password_123@mongodb:27017/?authSource=admin
    depends_on:
      - mongodb

volumes:
  mongo_data:
